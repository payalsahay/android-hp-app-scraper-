name: Friday Weekly Android Analysis

on:
  # Run every Friday at 8AM PST (4PM UTC)
  schedule:
    - cron: '0 16 * * 5'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Type of run'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - insights_only

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Weekly Android Scraper
        id: scrape
        run: |
          echo "Starting Weekly Android Scraper..."
          echo "Run Date: $(date +'%Y-%m-%d %H:%M %Z')"
          echo ""

          if [ "${{ github.event.inputs.run_type }}" == "insights_only" ]; then
            python scripts/weekly_android_scraper.py --insights-only
          else
            python scripts/weekly_android_scraper.py --all
          fi
        continue-on-error: true

      - name: Run CustomerInsight_Review_Agent Analysis
        run: |
          echo "Running CustomerInsight_Review_Agent on collected data..."

          if [ -f "data/HP_App_Android_US_Last30Days.json" ]; then
            echo "Analyzing Android US Last 30 Days..."
            python CustomerInsight_Review_Agent.py data/HP_App_Android_US_Last30Days.json || true
          fi

          if [ -f "data/HP_App_Android_AllCountries_Last30Days.json" ]; then
            echo "Analyzing Android All Countries Last 30 Days..."
            python CustomerInsight_Review_Agent.py data/HP_App_Android_AllCountries_Last30Days.json || true
          fi

          if [ -f "data/HP_App_Android_US_Last500.json" ]; then
            echo "Analyzing Android US Last 500..."
            python CustomerInsight_Review_Agent.py data/HP_App_Android_US_Last500.json || true
          fi

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/
          git add output/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly Android Analysis: $(date +'%Y-%m-%d') (Friday)

          Data collected:
          - Android US: Last 30 days rolling
          - Android All Countries: Last 30 days rolling
          - Android US: Last 500 reviews

          Analysis generated by CustomerInsight_Review_Agent

          Co-Authored-By: CustomerInsight_Review_Agent <noreply@github.com>
          Co-Authored-By: Claude Opus 4.5 <noreply@anthropic.com>"

            git push
          fi

      - name: Upload Analysis Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-android-analysis-${{ github.run_number }}
          path: |
            output/insights/*.md
            output/reports/*.json
            data/*.json
          retention-days: 90

      - name: Create GitHub Summary
        run: |
          echo "## Friday Weekly Android Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Run Date: $(date +'%Y-%m-%d %H:%M %Z') (Friday 8AM PST)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Data Collected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "data/HP_App_Android_US_Last30Days_Analytics.json" ]; then
            echo "#### Android US - Last 30 Days" >> $GITHUB_STEP_SUMMARY
            cat data/HP_App_Android_US_Last30Days_Analytics.json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f\"- **Total Reviews:** {data.get('total_reviews', 'N/A')}\")
          print(f\"- **Average Rating:** {data.get('avg_rating', 'N/A')}\")
          print(f\"- **1-Star:** {data.get('one_star_pct', 'N/A')}%\")
          " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "data/HP_App_Android_AllCountries_Last30Days_Analytics.json" ]; then
            echo "#### Android All Countries - Last 30 Days" >> $GITHUB_STEP_SUMMARY
            cat data/HP_App_Android_AllCountries_Last30Days_Analytics.json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f\"- **Total Reviews:** {data.get('total_reviews', 'N/A')}\")
          print(f\"- **Average Rating:** {data.get('avg_rating', 'N/A')}\")
          " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "data/HP_App_Android_US_Last500_Analytics.json" ]; then
            echo "#### Android US - Last 500" >> $GITHUB_STEP_SUMMARY
            cat data/HP_App_Android_US_Last500_Analytics.json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          print(f\"- **Total Reviews:** {data.get('total_reviews', 'N/A')}\")
          print(f\"- **Average Rating:** {data.get('avg_rating', 'N/A')}\")
          " >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Files Generated" >> $GITHUB_STEP_SUMMARY
          echo "- Android US Last 30 Days Insights Report" >> $GITHUB_STEP_SUMMARY
          echo "- Android All Countries Last 30 Days Insights Report" >> $GITHUB_STEP_SUMMARY
          echo "- Android US Last 500 Insights Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Automated by Weekly Android Scraper + CustomerInsight_Review_Agent*" >> $GITHUB_STEP_SUMMARY
